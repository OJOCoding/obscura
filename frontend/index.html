<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer" />
    <meta name="description" content="Obscura — Encrypted Dead Drop Messenger. Zero-knowledge, burn-after-read." />
    <link rel="icon" type="image/svg+xml" href="/obscura-logo.svg" />
    <title>Obscura</title>
    <script>
      // Apply stored theme before first paint to avoid a flash of wrong theme.
      (function() {
        try {
          var t = localStorage.getItem('obscura_theme');
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia('(prefers-color-scheme: light)').matches
              ? 'light' : 'dark';
          }
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
