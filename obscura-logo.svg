<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">

  <!-- Background -->
  <rect width="600" height="600" fill="#0B1726" rx="32" />

  <!-- Eye shape - clean almond -->
  <path d="M120,270 C175,185 235,155 300,155 C365,155 425,185 480,270 C425,355 365,385 300,385 C235,385 175,355 120,270Z"
        fill="none" stroke="#4A9EC7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Iris circle -->
  <circle cx="300" cy="270" r="62" fill="none" stroke="#4A9EC7" stroke-width="2.2" />

  <!-- Pupil -->
  <circle cx="300" cy="270" r="25" fill="#4A9EC7" opacity="0.15" stroke="#4A9EC7" stroke-width="2" />

  <!-- Keyhole - circle -->
  <circle cx="300" cy="263" r="6" fill="none" stroke="#7EC8E8" stroke-width="1.8" />

  <!-- Keyhole - stem -->
  <line x1="300" y1="269" x2="300" y2="285" stroke="#7EC8E8" stroke-width="1.8" stroke-linecap="round" />

  <!-- Specular highlight -->
  <circle cx="320" cy="248" r="5" fill="none" stroke="#7EC8E8" stroke-width="1.2" opacity="0.45" />

  <!-- App name -->
  <text x="300" y="462" text-anchor="middle" font-family="'Courier New', monospace" font-size="42" font-weight="400" letter-spacing="14" fill="#4A9EC7">OBSCURA</text>

  <!-- Underline -->
  <line x1="192" y1="478" x2="408" y2="478" stroke="#4A9EC7" stroke-width="0.8" stroke-linecap="round" opacity="0.3" />

  <!-- Tagline -->
  <text x="300" y="500" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" letter-spacing="5" fill="#2D6E8F" opacity="0.6">ENCRYPTED DEAD DROP</text>

</svg>